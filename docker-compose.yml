version: "3.8"

services:
  # PostgreSQL backend store for MLflow metadata
  postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlflow-network

  # MinIO S3-compatible artifact store
  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mlflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mlflow123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlflow-network

  # Create default bucket on startup
  minio-setup:
    image: minio/mc:latest
    container_name: mlflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-mlflow} $${MINIO_ROOT_PASSWORD:-mlflow123};
      mc mb myminio/$${MINIO_BUCKET_NAME:-mlflow-artifacts} --ignore-existing;
      mc anonymous set download myminio/$${MINIO_BUCKET_NAME:-mlflow-artifacts};
      exit 0;
      "
    networks:
      - mlflow-network

  # MLflow Tracking Server
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlflow-server
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-mlflow}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-mlflow123}
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --default-artifact-root s3://${MINIO_BUCKET_NAME:-mlflow-artifacts}/
      --serve-artifacts
    networks:
      - mlflow-network

volumes:
  postgres_data:
  minio_data:

networks:
  mlflow-network:
    driver: bridge
